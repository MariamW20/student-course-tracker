name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Flask app imports
        env:
          DATABASE_URL: sqlite:///ci.db
          SECRET_KEY: ci-secret
        run: python -c "from wsgi import app; print(app.url_map)"
