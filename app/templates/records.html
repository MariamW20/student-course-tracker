<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recorded Details | Student Course Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body class="dashboard-body">
    <main class="container py-4">
      <section class="hero mb-4 p-4 rounded-4">
        <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-start">
          <div>
            <p class="eyebrow mb-2">Recorded Details</p>
            <h1 class="display-6 mb-3">Student Course Tracker</h1>
            <p class="lead mb-0">
              Review saved student profiles, course records, and enrollment activity on a separate page.
            </p>
          </div>
          <div class="dashboard-stats">
            <div class="stat-card">
              <span>Students</span>
              <strong id="studentCount">0</strong>
            </div>
            <div class="stat-card">
              <span>Courses</span>
              <strong id="courseCount">0</strong>
            </div>
            <div class="stat-card">
              <span>Enrollments</span>
              <strong id="enrollmentCount">0</strong>
            </div>
          </div>
        </div>
        <div class="toolbar mt-4">
          <div class="user-pill">
            Signed in as <strong id="sessionUser">admin</strong>
          </div>
          <div class="toolbar-actions">
            <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.index') }}">Back to Recording Page</a>
            <button id="logoutButton" class="btn btn-outline-light btn-sm">Logout</button>
          </div>
        </div>
      </section>

      <section class="mb-4">
        <div id="alertHost"></div>
      </section>

      <section class="row g-4">
        <div class="col-12 col-xl-4">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h2 class="h4">Students</h2>
              <div id="studentsList" class="list-stack"></div>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-4">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h2 class="h4">Courses</h2>
              <div id="coursesList" class="list-stack"></div>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-4">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h2 class="h4">Enrollments</h2>
              <div id="enrollmentsList" class="list-stack"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
  </html>
